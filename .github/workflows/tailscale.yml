name: Tailscale Yes

on:
  workflow_dispatch:
    inputs:
      runner-type:
        description: runner machine type
        type: string
        required: false
        default: 'ubuntu-22.04'
      idle-timeout:
        description: idle timeout in seconds (0 to disable)
        type: number
        required: false
        default: 600
      free-space:
        description: free space
        type: boolean
        required: false
        default: false

jobs:
  yyds:
    runs-on: ${{ inputs.runner-type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show Workflow env
        run: env

      - name: Setup Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh && sudo tailscale up --auth-key=${{ secrets.TAILSCALE_AUTH_KEY }} --advertise-exit-node --ssh

      - name: Init Shell and Interceptors
        run: |
          sudo bash .github/scripts/setup.sh

      - name: Free Disk Space (Ubuntu)
        if: ${{ inputs.free-space }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Keep Runner Alive and Monitor Idle
        env:
          IDLE_TIMEOUT: ${{ inputs.idle-timeout }}
        run: |
          echo "Runner is active. Connect via Tailscale SSH and run 'poweroff' to terminate."
          
          # Run idle watcher in background
          sudo IDLE_TIMEOUT=${{ inputs.idle-timeout }} bash .github/scripts/idle-watcher.sh &
          
          # Main loop to wait for signal
          while [ ! -f /tmp/stop_runner ]; do 
            date
            sleep 30
          done
          
          echo "Shutdown signal received. Exiting loop."
